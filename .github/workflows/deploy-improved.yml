name: 🚀 Build & Deploy — Art de Table → Hostinger (v2)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: 24
  DEPLOY_DIR: dist
  NODE_ENV: production

jobs:
  # ========== BUILD JOB ==========
  build:
    runs-on: ubuntu-latest
    outputs:
      build-artifact: dist-${{ github.sha }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔍 Lint TypeScript
        run: npm run lint
        continue-on-error: true

      - name: 🔨 Build production app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BUILD_MODE: production

      - name: ✅ Verify build artifacts
        run: |
          echo "📊 Build Statistics:"
          test -d "${{ env.DEPLOY_DIR }}" || { echo "❌ Build failed: dist/ not found"; exit 1; }
          echo "✓ dist/ folder exists"
          echo ""
          echo "📁 Contents:"
          ls -lh ${{ env.DEPLOY_DIR }}/ | head -20
          echo ""
          echo "📈 Total size:"
          du -sh ${{ env.DEPLOY_DIR }}/

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ outputs.build-artifact }}
          path: dist/
          retention-days: 1
          compression-level: 0

  # ========== SECURITY CHECKS ==========
  security-check:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Check for secrets in code
        run: |
          if grep -r "API_KEY\|SECRET\|PASSWORD" src/ --include="*.tsx" --include="*.ts"; then
            echo "⚠️ Warning: Found potential secrets in code!"
            exit 1
          fi
          echo "✅ No secrets found in source code"

      - name: 🔍 Check environment variables
        run: |
          test -f .env.example || echo "⚠️ .env.example not found"
          echo "✅ Security check passed"

  # ========== DEPLOY TO HOSTINGER ==========
  deploy:
    needs: [build, security-check]
    runs-on: ubuntu-latest
    concurrency:
      group: hostinger-deploy-${{ github.ref }}
      cancel-in-progress: false
    
    steps:
      - name: 📥 Checkout for deployment
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.build-artifact }}
          path: dist/

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOSTINGER_FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🧪 Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }} \
            "echo '✅ SSH Connection successful' && pwd"

      - name: 📂 Create backup directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }} \
            "cd ${{ secrets.HOSTINGER_REMOTE_PATH }} && \
             BACKUP_DIR=backups/backup-\$(date +%Y%m%d-%H%M%S) && \
             mkdir -p \$BACKUP_DIR && \
             [ -f index.html ] && cp -r * \$BACKUP_DIR/ || true && \
             echo \"✅ Backup created: \$BACKUP_DIR\" && \
             ls -la backups/ | tail -5"

      - name: 🧹 Clean remote directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }} \
            "cd ${{ secrets.HOSTINGER_REMOTE_PATH }} && \
             find . -maxdepth 1 -type f -delete && \
             find . -maxdepth 1 -type d ! -name '.' ! -name 'backups' -exec rm -rf {} + 2>/dev/null || true && \
             echo '✅ Remote directory cleaned'"

      - name: 📤 Deploy files via SCP
        run: |
          scp -i ~/.ssh/deploy_key \
            -r -C \
            -o ConnectTimeout=30 \
            dist/* \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }}:${{ secrets.HOSTINGER_REMOTE_PATH }}/

      - name: ✅ Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }} \
            "cd ${{ secrets.HOSTINGER_REMOTE_PATH }} && \
             echo '📂 Files deployed:' && \
             ls -lh | head -20 && \
             echo '' && \
             echo '✓ index.html exists:' && \
             [ -f index.html ] && echo 'YES ✅' || echo 'NO ❌' && \
             echo '' && \
             echo '📊 Directory size:' && \
             du -sh ."

      - name: 🌐 Health Check
        run: |
          SITE_URL="${{ secrets.HOSTINGER_SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            echo "⚠️ HOSTINGER_SITE_URL not set - skipping health check"
            exit 0
          fi
          
          for i in {1..5}; do
            echo "🔄 Health check attempt $i/5..."
            if curl -f -m 10 "$SITE_URL" > /dev/null 2>&1; then
              echo "✅ Site is online!"
              curl -I "$SITE_URL" 2>/dev/null | head -5
              exit 0
            fi
            sleep 5
          done
          echo "⚠️ Health check failed - verify manually at $SITE_URL"
          exit 0

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          echo "✅ Secrets cleaned up"

  # ========== NOTIFICATION ==========
  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📢 Build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build: SUCCESS"
          else
            echo "❌ Build: FAILED"
          fi
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy: SUCCESS"
          else
            echo "❌ Deploy: FAILED"
          fi
          
          echo ""
          echo "🔗 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: ❌ On failure - Log error details
        if: failure()
        run: |
          echo "💥 Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Branch: ${{ github.ref }}"
          echo ""
          echo "📍 Action logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

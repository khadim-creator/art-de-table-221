name: 🚀 Build & Deploy — Art de Table → Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24
  DEPLOY_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: hostinger-deploy-main
      cancel-in-progress: true

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build production app
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Check dist folder
        run: |
          test -d "${DEPLOY_DIR}"
          ls -la "${DEPLOY_DIR}/"
          du -sh "${DEPLOY_DIR}/"

      - name: 🚀 Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.HOSTINGER_REMOTE_PATH }}
            rm -rf *
            exit

      - name: 📤 Upload files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: ${{ secrets.HOSTINGER_REMOTE_PATH }}